name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    name: Build pizerarr server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            artifact: pizerarr-linux-arm64
          - target: x86_64-unknown-linux-gnu
            artifact: pizerarr-linux-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --features vendored-openssl --target ${{ matrix.target }}
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/pizerarr ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-apk:
    name: Build Fire TV APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build APK
        working-directory: android
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          ./gradlew app:assembleRelease
      - name: Sign APK
        run: |
          keytool -genkeypair -v -keystore release.keystore -alias pizerarr \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pizerarr -keypass pizerarr -dname "CN=pizerarr"
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            pizerarr-firetv.apk
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks release.keystore --ks-pass pass:pizerarr --key-pass pass:pizerarr \
            pizerarr-firetv.apk
      - uses: actions/upload-artifact@v4
        with:
          name: pizerarr-firetv.apk
          path: pizerarr-firetv.apk

  release:
    name: Create Release
    needs: [build-server, build-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pizerarr-linux-arm64
            pizerarr-linux-x86_64
            pizerarr-firetv.apk
          generate_release_notes: true
